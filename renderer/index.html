<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src *; img-src *;">
  <title>WebRadio</title>
  <script type="module" src="app.js"></script>
  <link rel="stylesheet" href="styles/core.css"> 
  <link rel="stylesheet" id="theme-style">
</head>
<body>
<div class="titlebar">
  <div class="titlebar-left">
    <div class="app-logo"></div>
    <span class="app-title">WebRadio</span>
  </div>
  <div class="titlebar-right">
    <button class="window-btn" id="btnMinimize">
      <svg viewbox="0 0 10 1"><rect width="10" height="1"/></svg>
    </button>
    <button class="window-btn" id="btnMaximize">
      <svg viewbox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor"/></svg>
    </button>
    <button class="window-btn close" id="btnClose">
      <svg viewbox="0 0 10 10">
        <path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor"/>
      </svg>
    </button>
  </div>
</div>

<div class="nowPlaying">

  <div class="np-left">

    <img id="np-logo" class="np-logo" src="../assets/default-logo.png">

    <div class="np-info">
      <div id="np-station" class="np-station">Kein Sender</div>
      <div id="np-title" class="np-title">–</div>
    </div>

  </div>

</div>

<div class="app">

  <aside class="sidebar">
    <h2>WebRadio</h2>


  <input id="searchInput" placeholder="Sender suchen">
  
  <select id="countryFilter">
    <option value="">Alle Länder</option>
  </select>

  <select id="genreFilter">
    <option value="">Alle Genres</option>
  </select>

  <button id="searchBtn">Suchen</button>

    <h3>Favoriten</h3>
    <ul id="favList"></ul>
    <button id="loadFav">Favoriten laden</button>

    <h3>Zuletzt gehört</h3>
    <ul id="historyList"></ul>
    <button id="loadHistory">Verlauf laden</button>

  </aside>

  <main class="content">
    <h3>Sender</h3>
    <div id="radioGrid"></div>
  </main>

</div>

<footer class="player">
  <span id="nowPlaying">Kein Sender aktiv</span>
  <label>
    Lautstärke
    <input id="volume" type="range" min="0" max="1" step="0.01" value="1.0">
    <canvas id="vu" width="300" height="50"></canvas>
  </label>
  <button id="playBtn">▶</button>
  <button id="stopBtn">⏹</button>
  <select id="themeSelector"></select>
</footer>
</body>
</html>
