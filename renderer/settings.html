<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src *; img-src *;">
  <title>WebRadio Einstellungen</title>
  <link rel="stylesheet" href="styles/core.css">
  <link rel="stylesheet" id="theme-style">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="app-logo"></div>
      <span class="app-title">WebRadio</span>
    </div>
    <div class="titlebar-right">
      <button class="window-btn" id="btnMinimize">
        <svg viewbox="0 0 10 1"><rect width="10" height="1"/></svg>
      </button>
      <button class="window-btn" id="btnMaximize">
        <svg viewbox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor"/></svg>
      </button>
      <button class="window-btn close" id="btnClose">
        <svg viewbox="0 0 10 10">
          <path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="settings-container">
    <h2>Einstellungen</h2>

    
    <div class="settings">

      <h2>Plugins</h2>
      <div id="pluginList"></div>

      <h2>Themes</h2>
      <div id="themeList"></div>

    </div>

    <button id="saveBtn">Speichern</button>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
